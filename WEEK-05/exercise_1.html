<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color:aqua;
            border:3px solid black;
            height:250px;
            width:400px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            margin-top: 100px;
            margin-left: 300px;
            font-size: large;
            box-shadow: 5px 5px 5px ;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        button{
            background-color: aliceblue;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: medium;
            padding:2px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div>
        <form id="login form">
            <h1><i>Login Page</i></h1>
            <label for="name"><i>Username:</i></label>
            <input id="userName" type="text" placeholder="enter your name">
            <br>
            <br>
            <label for="password"><i>Password:</i></label>
            <input id="password" type="password" placeholder="enter your password">
            <br>
            <br>
            <button id="btn" type="submit" ><i>Submit</i></button>
        </form>
    </div>
        <script>
            const userName=document.getElementById("userName");
            const password=document.getElementById("password");
            const form=document.getElementById("login form");
            const btn=document.getElementById("btn");
            let count=0;
            let isvalidname=true;
            let isvalidpass=true;
            form.addEventListener("submit",()=>
        {
            
           
            event.preventDefault();
            
            if(userName.value==""){ 
                userName.placeholder="cant be empty!!"
                isvalidname=false;
            }
            else{
                isvalidname=true;
            }
            if(password.value.length<6){ 
                password.value=""; password.placeholder="must be atleast 6 characters";
                isvalidpass=false;
            }
            else{
                isvalidpass=true;
            }
            if(!isvalidname || !isvalidpass)
            {
                count++;
            }
             if(count>3)
        {
            btn.disabled=true;
            userName.placeholder="limit exceeded";
            password.placeholder="limit execeeded";
        }
            console.log(userName.value);
            console.log(password.value);
            console.log(count);
        }
    );
    
            



        </script>
    
</body>
</html>
